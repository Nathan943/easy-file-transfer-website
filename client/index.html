<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File sharing yippee</title>
</head>
<body>
    <h1>File sharing</h1>
    <h2 id="name"></h2>
    <button type="button" id="code_button">Generate code</button>
    <input type="text" id="pairing_field" placeholder="Enter pairing code">
    <h2 id="code_display"></h2>
    <input type="file" id="file_upload">
    <select id="client_selection">
        <option value="" disabled hidden selected>Select...</option>
    </select>
    <button type="button" id="send">Send</button>

    <script src="client.js"></script>
</body>
</html>
